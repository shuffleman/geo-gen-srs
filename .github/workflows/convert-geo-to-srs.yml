name: Convert GEO to SRS

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

env:
  SING_BOX_VERSION: '1.12.14'

jobs:
  convert-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install sing-box
        run: |
          SING_BOX_URL="https://github.com/SagerNet/sing-box/releases/download/v${{ env.SING_BOX_VERSION }}/sing-box-${{ env.SING_BOX_VERSION }}-linux-amd64.tar.gz"
          wget -q --timeout=60 "$SING_BOX_URL" -O sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/sing-box
          sing-box version

      - name: Install v2dat (extract dat files)
        run: |
          # 下载 v2dat
          V2DAT_URL="https://github.com/urlesistiana/v2dat/releases/download/v0.2.0/v2dat-linux-amd64"
          wget -q --timeout=60 "$V2DAT_URL" -O /usr/local/bin/v2dat
          sudo chmod +x /usr/local/bin/v2dat
          v2dat version || true

      - name: Download dat files
        run: |
          mkdir -p geo output/geoip output/geosite
          
          # 下载 geoip.dat（带重试）
          for url in \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat" \
            "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat" \
            "https://fastly.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat"
          do
            echo "Trying: $url"
            if wget -q --timeout=60 --tries=2 "$url" -O geo/geoip.dat; then
              echo "✓ Downloaded geoip.dat"
              break
            fi
          done
          
          # 下载 geosite.dat（带重试）
          for url in \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat" \
            "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat" \
            "https://fastly.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat"
          do
            echo "Trying: $url"
            if wget -q --timeout=60 --tries=2 "$url" -O geo/geosite.dat; then
              echo "✓ Downloaded geosite.dat"
              break
            fi
          done
          
          # 验证
          ls -lh geo/
          file geo/*.dat || true

      - name: List dat categories
        run: |
          echo "=== GeoIP categories ==="
          v2dat geoip geo/geoip.dat -l || true
          
          echo ""
          echo "=== Geosite categories ==="
          v2dat geosite geo/geosite.dat -l || true

      - name: Convert geoip to srs
        run: |
          # 要转换的类别
          categories="cn private us jp hk tw sg kr gb de fr au ca cloudflare cloudfront facebook fastly google netflix telegram twitter"
          
          for cat in $categories; do
            echo "Processing geoip: $cat"
            
            # 使用 v2dat 导出为纯文本（CIDR列表）
            mkdir -p geo/geoip-${cat}
            if v2dat geoip geo/geoip.dat -f "$cat" -d geo/geoip-${cat} 2>/dev/null; then
              # 查找导出的文件
              ip_file=$(find geo/geoip-${cat} -name "*.txt" -o -name "*.list" 2>/dev/null | head -1)
              
              if [ -n "$ip_file" ] && [ -s "$ip_file" ]; then
                count=$(wc -l < "$ip_file")
                echo "  Found $count entries"
                
                # 构建 rule-set JSON
                echo '{"version":2,"rules":[{"ip_cidr":[' > geo/geoip-${cat}.json
                first=true
                while IFS= read -r line || [ -n "$line" ]; do
                  [ -z "$line" ] && continue
                  # 清理行（移除注释和空行）
                  line=$(echo "$line" | sed 's/#.*//' | tr -d '[:space:]')
                  [ -z "$line" ] && continue
                  
                  if [ "$first" = true ]; then
                    first=false
                    printf '"%s"' "$line" >> geo/geoip-${cat}.json
                  else
                    printf ',"%s"' "$line" >> geo/geoip-${cat}.json
                  fi
                done < "$ip_file"
                echo ']}]}' >> geo/geoip-${cat}.json
                
                # 编译为 srs
                if sing-box rule-set compile geo/geoip-${cat}.json -o output/geoip/${cat}.srs 2>/dev/null; then
                  echo "  ✓ Created ${cat}.srs"
                else
                  echo "  ✗ Compile failed for ${cat}"
                fi
              else
                echo "  ✗ No data exported for ${cat}"
              fi
            else
              echo "  ✗ Export failed for ${cat}"
            fi
            
            # 清理
            rm -rf geo/geoip-${cat} geo/geoip-${cat}.json 2>/dev/null || true
          done

      - name: Convert geosite to srs
        run: |
          # 要转换的类别
          categories="cn private google youtube telegram twitter facebook instagram whatsapp netflix disney cloudflare fastly category-ads category-games geolocation-!cn geolocation-cn"
          
          for cat in $categories; do
            echo "Processing geosite: $cat"
            
            # 使用 v2dat 导出
            mkdir -p geo/geosite-${cat}
            if v2dat geosite geo/geosite.dat -f "$cat" -d geo/geosite-${cat} 2>/dev/null; then
              # 查找导出的文件
              domain_file=$(find geo/geosite-${cat} -name "*.txt" -o -name "*.list" 2>/dev/null | head -1)
              
              if [ -n "$domain_file" ] && [ -s "$domain_file" ]; then
                count=$(wc -l < "$domain_file")
                echo "  Found $count entries"
                
                # 构建 rule-set JSON（支持 domain 和 domain_suffix）
                echo '{"version":2,"rules":[{"domain":[' > geo/geosite-${cat}.json
                first=true
                while IFS= read -r line || [ -n "$line" ]; do
                  [ -z "$line" ] && continue
                  # 清理行
                  line=$(echo "$line" | sed 's/#.*//' | tr -d '[:space:]')
                  [ -z "$line" ] && continue
                  
                  # 处理 domain: 和 full: 前缀
                  if [[ "$line" == domain:* ]]; then
                    line="${line#domain:}"
                  elif [[ "$line" == full:* ]]; then
                    line="${line#full:}"
                  fi
                  
                  if [ "$first" = true ]; then
                    first=false
                    printf '"%s"' "$line" >> geo/geosite-${cat}.json
                  else
                    printf ',"%s"' "$line" >> geo/geosite-${cat}.json
                  fi
                done < "$domain_file"
                echo ']}]}' >> geo/geosite-${cat}.json
                
                # 编译为 srs
                if sing-box rule-set compile geo/geosite-${cat}.json -o output/geosite/${cat}.srs 2>/dev/null; then
                  echo "  ✓ Created ${cat}.srs"
                else
                  echo "  ✗ Compile failed for ${cat}"
                fi
              else
                echo "  ✗ No data exported for ${cat}"
              fi
            else
              echo "  ✗ Export failed for ${cat}"
            fi
            
            # 清理
            rm -rf geo/geosite-${cat} geo/geosite-${cat}.json 2>/dev/null || true
          done

      - name: Verify and package
        run: |
          echo "=== Output files ==="
          ls -la output/geoip/ 2>/dev/null || echo "No geoip files"
          ls -la output/geosite/ 2>/dev/null || echo "No geosite files"
          
          # 统计
          geoip_count=$(find output/geoip -name "*.srs" 2>/dev/null | wc -l)
          geosite_count=$(find output/geosite -name "*.srs" 2>/dev/null | wc -l)
          echo "GeoIP: $geoip_count, Geosite: $geosite_count"
          
          # 创建列表文件
          find output/geoip -name "*.srs" -exec basename {} .srs \; > output/geoip-list.txt 2>/dev/null || echo "none" > output/geoip-list.txt
          find output/geosite -name "*.srs" -exec basename {} .srs \; > output/geosite-list.txt 2>/dev/null || echo "none" > output/geosite-list.txt
          
          # 打包
          cd output
          if [ $geoip_count -gt 0 ]; then
            tar -czf geoip-all.tar.gz geoip/
          fi
          if [ $geosite_count -gt 0 ]; then
            tar -czf geosite-all.tar.gz geosite/
          fi
          if [ $geoip_count -gt 0 ] && [ $geosite_count -gt 0 ]; then
            tar -czf geo-all.tar.gz geoip/ geosite/
          fi
          
          # 校验和
          find . -type f \( -name "*.srs" -o -name "*.tar.gz" \) -exec sha256sum {} \; > sha256sums.txt
          
          cd ..
          ls -lh output/

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: SRS Rules Release ${{ github.run_number }}
          body: |
            ## sing-box SRS Rule Sets
            
            自动转换的 geoip 和 geosite 规则集。
            
            **转换时间**: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            
            ### 使用方法
            
            ```json
            {
              "type": "remote",
              "tag": "geoip-cn",
              "format": "binary",
              "url": "https://github.com/${{ github.repository }}/releases/download/v${{ github.run_number }}/geoip-cn.srs",
              "download_detour": "proxy"
            }
            ```
          files: |
            output/geoip/*.srs
            output/geosite/*.srs
            output/geoip-all.tar.gz
            output/geosite-all.tar.gz
            output/geo-all.tar.gz
            output/sha256sums.txt
            output/geoip-list.txt
            output/geosite-list.txt
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: rm -rf geo output sing-box.tar.gz sing-box-*
