name: Build Geo Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 安装 Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      # ✅ 编译 geodat2srs
      - name: Build geodat2srs
        run: |
          set -e

          git clone https://github.com/runetfreedom/geodat2srs.git
          cd geodat2srs

          go mod tidy
          go build -o geodat2srs

          chmod +x geodat2srs
          sudo mv geodat2srs /usr/local/bin/geodat2srs

          geodat2srs -h || true

      # ✅ 下载 dat（双源 fallback）
      - name: Download dat files
        run: |
          set -e

          download() {
            url1=$1
            url2=$2
            output=$3

            echo "Downloading $output..."

            if curl -L --fail -o "$output" "$url1"; then
              echo "Primary success"
            else
              echo "Primary failed, trying fallback..."
              curl -L --fail -o "$output" "$url2"
            fi
          }

          download \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat" \
            "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat" \
            "geoip.dat"

          download \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat" \
            "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat" \
            "geosite.dat"

      # ✅ 转换
      - name: Convert to SRS
        run: |
          set -e

          mkdir -p output

          geodat2srs geoip.dat output/geoip.srs
          geodat2srs geosite.dat output/geosite.srs

          ls -lh output

      # ✅ 生成 tag
      - name: Generate tag
        id: tag
        run: echo "tag=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      # ✅ 发布 Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Geo Rules ${{ steps.tag.outputs.tag }}
          files: |
            geoip.dat
            geosite.dat
            output/geoip.srs
            output/geosite.srs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
