name: Convert GEO to SRS

on:
  # 手动触发
  workflow_dispatch:
  
  # 定时触发（每天 UTC 02:00 运行）
  schedule:
    - cron: '0 2 * * *'
  
  # 监听上游仓库更新（可选，需要配置 personal access token）
  # repository_dispatch:
  #   types: [upstream-updated]

env:
  SING_BOX_VERSION: '1.12.14'

jobs:
  convert-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download sing-box
        run: |
          # 下载对应版本的 sing-box
          SING_BOX_URL="https://github.com/SagerNet/sing-box/releases/download/v${{ env.SING_BOX_VERSION }}/sing-box-${{ env.SING_BOX_VERSION }}-linux-amd64.tar.gz"
          wget -q "$SING_BOX_URL" -O sing-box.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/sing-box
          sudo chmod +x /usr/local/bin/sing-box
          sing-box version

      - name: Download geoip.dat
        run: |
          mkdir -p geo
          # 尝试多个镜像源
          wget -q --timeout=30 "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat" -O geo/geoip.dat || \
          wget -q --timeout=30 "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat" -O geo/geoip.dat || \
          wget -q --timeout=30 "https://fastly.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat" -O geo/geoip.dat
          
          if [ ! -f geo/geoip.dat ]; then
            echo "Failed to download geoip.dat"
            exit 1
          fi
          
          # 验证文件大小
          ls -lh geo/geoip.dat

      - name: Download geosite.dat
        run: |
          # 尝试多个镜像源
          wget -q --timeout=30 "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat" -O geo/geosite.dat || \
          wget -q --timeout=30 "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat" -O geo/geosite.dat || \
          wget -q --timeout=30 "https://fastly.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat" -O geo/geosite.dat
          
          if [ ! -f geo/geosite.dat ]; then
            echo "Failed to download geosite.dat"
            exit 1
          fi
          
          ls -lh geo/geosite.dat

      - name: Convert geoip to srs
        run: |
          mkdir -p output/geoip
          
          # 定义需要转换的 geoip 类别
          GEOIP_CATEGORIES=(
            "cn"
            "private"
            "us"
            "jp"
            "hk"
            "tw"
            "sg"
            "kr"
            "gb"
            "de"
            "fr"
            "au"
            "ca"
            "cloudflare"
            "cloudfront"
            "facebook"
            "fastly"
            "google"
            "netflix"
            "telegram"
            "twitter"
          )
          
          for category in "${GEOIP_CATEGORIES[@]}"; do
            echo "Converting geoip: $category"
            
            # 导出为 JSON
            if sing-box geoip export "$category" -f geo/geoip.dat > "geo/geoip-${category}.json" 2>/dev/null; then
              # 编译为 srs
              if sing-box rule-set compile "geo/geoip-${category}.json" -o "output/geoip/${category}.srs" 2>/dev/null; then
                echo "✓ Successfully converted geoip-${category}.srs"
              else
                echo "✗ Failed to compile geoip-${category}"
              fi
              rm -f "geo/geoip-${category}.json"
            else
              echo "✗ Category '$category' not found in geoip.dat"
            fi
          done
          
          # 创建索引文件
          ls output/geoip/ > output/geoip-list.txt

      - name: Convert geosite to srs
        run: |
          mkdir -p output/geosite
          
          # 定义需要转换的 geosite 类别（常用）
          GEOSITE_CATEGORIES=(
            "cn"
            "private"
            "google"
            "youtube"
            "telegram"
            "twitter"
            "facebook"
            "instagram"
            "whatsapp"
            "netflix"
            "disney"
            "hbo"
            "hulu"
            "primevideo"
            "dazn"
            "spotify"
            "apple"
            "microsoft"
            "amazon"
            "github"
            "gitlab"
            "stackoverflow"
            "docker"
            "kubernetes"
            "cloudflare"
            "fastly"
            "akamai"
            "category-ads"
            "category-ads-all"
            "category-games"
            "category-gambling"
            "category-porn"
            "category-cryptocurrency"
            "category-dev"
            "category-ecommerce"
            "category-education"
            "category-entertainment"
            "category-finance"
            "category-forums"
            "category-media"
            "category-news"
            "category-social-media-!cn"
            "category-scholar-!cn"
            "geolocation-!cn"
            "geolocation-cn"
          )
          
          for category in "${GEOSITE_CATEGORIES[@]}"; do
            echo "Converting geosite: $category"
            
            # 导出为 JSON
            if sing-box geosite export "$category" -f geo/geosite.dat > "geo/geosite-${category}.json" 2>/dev/null; then
              # 编译为 srs
              if sing-box rule-set compile "geo/geosite-${category}.json" -o "output/geosite/${category}.srs" 2>/dev/null; then
                echo "✓ Successfully converted geosite-${category}.srs"
              else
                echo "✗ Failed to compile geosite-${category}"
              fi
              rm -f "geo/geosite-${category}.json"
            else
              echo "✗ Category '$category' not found in geosite.dat"
            fi
          done
          
          # 创建索引文件
          ls output/geosite/ > output/geosite-list.txt

      - name: Package outputs
        run: |
          # 创建压缩包
          cd output
          
          # 分别打包 geoip 和 geosite
          tar -czf geoip-all.tar.gz geoip/
          tar -czf geosite-all.tar.gz geosite/
          tar -czf geo-all.tar.gz geoip/ geosite/
          
          # 计算校验和
          sha256sum *.tar.gz *.srs geoip/*.srs geosite/*.srs > sha256sums.txt 2>/dev/null || true
          
          cd ..
          
          # 列出输出
          ls -lh output/

      - name: Generate release notes
        run: |
          cat > release_notes.md << 'EOF'
          ## sing-box SRS Rule Sets
          
          自动转换的 geoip 和 geosite 规则集，适用于 sing-box 1.8.0+ 版本。
          
          ### 数据来源
          - [Loyalsoldier/v2ray-rules-dat](https://github.com/Loyalsoldier/v2ray-rules-dat)
          
          ### 使用方法
          
          **远程加载（推荐）：**
          ```json
          {
            "type": "remote",
            "tag": "geoip-cn",
            "format": "binary",
            "url": "https://github.com/YOUR_USERNAME/YOUR_REPO/releases/latest/download/geoip-cn.srs",
            "download_detour": "proxy"
          }
          ```
          
          **本地加载：**
          ```json
          {
            "type": "local",
            "tag": "geoip-cn",
            "format": "binary",
            "path": "/path/to/geoip-cn.srs"
          }
          ```
          
          ### 包含的类别
          - **GeoIP**: cn, private, us, jp, hk, tw, sg, kr, gb, de, fr, au, ca, cloudflare, cloudfront, facebook, fastly, google, netflix, telegram, twitter
          - **Geosite**: cn, private, google, youtube, telegram, twitter, facebook, netflix, category-ads, category-games, geolocation-!cn, geolocation-cn 等
          
          ### 文件说明
          - `geoip-all.tar.gz`: 所有 geoip srs 文件打包
          - `geosite-all.tar.gz`: 所有 geosite srs 文件打包
          - `geo-all.tar.gz`: 完整的 geoip + geosite 打包
          - `sha256sums.txt`: 校验和文件
          EOF

      - name: Delete old releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 3
          delete_tag_pattern: 'v'
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: SRS Rules Release ${{ github.run_number }}
          body_path: release_notes.md
          files: |
            output/geoip/*.srs
            output/geosite/*.srs
            output/geoip-all.tar.gz
            output/geosite-all.tar.gz
            output/geo-all.tar.gz
            output/sha256sums.txt
            output/geoip-list.txt
            output/geosite-list.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        run: |
          rm -rf geo output sing-box.tar.gz sing-box-*
