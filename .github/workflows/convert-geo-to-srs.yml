name: Build Geo Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # 每天 UTC 03:00

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          set -e

          VERSION="1.12.19"
          URL="https://github.com/SagerNet/sing-box/releases/download/v${VERSION}/sing-box-${VERSION}-linux-amd64.tar.gz"

          echo "Downloading sing-box v${VERSION}..."
          curl -L --fail -o sing-box.tar.gz "$URL"

          echo "Checking file..."
          file sing-box.tar.gz

          tar -xzf sing-box.tar.gz
          mv sing-box-*/sing-box /usr/local/bin/sing-box
          chmod +x /usr/local/bin/sing-box

          echo "Installed version:"
          sing-box version

      - name: Download dat files (with fallback)
        run: |
          set -e

          download() {
            url1=$1
            url2=$2
            output=$3

            echo "Downloading $output..."

            if curl -L --fail -o "$output" "$url1"; then
              echo "Primary success"
            else
              echo "Primary failed, trying fallback..."
              curl -L --fail -o "$output" "$url2"
            fi
          }

          download \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat" \
            "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat" \
            "geoip.dat"

          download \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat" \
            "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat" \
            "geosite.dat"

      - name: Convert to SRS
        run: |
          set -e

          mkdir -p output

          sing-box rule-set convert \
            --type geoip \
            --input geoip.dat \
            --output output/geoip.srs

          sing-box rule-set convert \
            --type geosite \
            --input geosite.dat \
            --output output/geosite.srs

          ls -lh output

      - name: Generate tag
        id: tag
        run: echo "tag=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Geo Rules ${{ steps.tag.outputs.tag }}
          files: |
            geoip.dat
            geosite.dat
            output/geoip.srs
            output/geosite.srs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
