name: Build Geo Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build geodat2srs
        run: |
          set -e

          git clone https://github.com/runetfreedom/geodat2srs.git
          cd geodat2srs

          go build -o geodat2srs
          chmod +x geodat2srs
          sudo mv geodat2srs /usr/local/bin/geodat2srs

      - name: Download dat files
        run: |
          set -e

          download() {
            url1=$1
            url2=$2
            output=$3

            if curl -L --fail -o "$output" "$url1"; then
              echo "Primary success"
            else
              curl -L --fail -o "$output" "$url2"
            fi
          }

          download \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat" \
            "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat" \
            "geoip.dat"

          download \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat" \
            "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat" \
            "geosite.dat"

      - name: Convert to SRS
        run: |
          set -e

          mkdir -p geoip geosite

          geodat2srs geoip -i geoip.dat -o geoip --prefix "geoip-"
          geodat2srs geosite -i geosite.dat -o geosite --prefix "geosite-"

      - name: Package files
        run: |
          set -e

          tar -czf geoip.tar.gz geoip
          tar -czf geosite.tar.gz geosite

          ls -lh *.tar.gz

      - name: Generate tag
        id: tag
        run: echo "tag=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Geo Rules ${{ steps.tag.outputs.tag }}
          files: |
            geoip.tar.gz
            geosite.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
