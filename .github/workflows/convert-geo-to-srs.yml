name: Build Geo Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # 每天 UTC 03:00 自动运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sing-box
        run: |
          curl -Lo sing-box.tar.gz https://github.com/SagerNet/sing-box/releases/latest/download/sing-box-linux-amd64.tar.gz
          tar -xzf sing-box.tar.gz
          sudo mv sing-box-*/sing-box /usr/local/bin/sing-box
          sing-box version

      - name: Download dat files (with fallback)
        run: |
          set -e

          download() {
            url1=$1
            url2=$2
            output=$3

            echo "Downloading $output..."
            if curl -L --fail -o "$output" "$url1"; then
              echo "Downloaded from primary source"
            else
              echo "Primary failed, trying fallback..."
              curl -L --fail -o "$output" "$url2"
            fi
          }

          download \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat" \
            "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat" \
            "geoip.dat"

          download \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat" \
            "https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat" \
            "geosite.dat"

      - name: Convert to SRS
        run: |
          mkdir -p output

          sing-box rule-set convert \
            --type geoip \
            --input geoip.dat \
            --output output/geoip.srs

          sing-box rule-set convert \
            --type geosite \
            --input geosite.dat \
            --output output/geosite.srs

      - name: Generate tag
        id: tag
        run: echo "tag=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Geo Rules ${{ steps.tag.outputs.tag }}
          files: |
            geoip.dat
            geosite.dat
            output/geoip.srs
            output/geosite.srs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
